<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Right side + border gradient (darker, lighter upward) -->
    <linearGradient id="darkGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2f2f2f"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>

    <!-- Left light gradient -->
    <linearGradient id="lightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcdcdc"/>
    </linearGradient>

    <!-- COOL text -->
    <linearGradient id="coolText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
  </defs>

  <!-- Outer border (now gradient-matched) -->
  <rect x="5" y="5" width="890" height="250" rx="40"
        fill="url(#darkGrad)" />

  <!-- Inner background -->
  <clipPath id="clip">
    <rect x="15" y="15" width="870" height="230" rx="34"/>
  </clipPath>

  <g clip-path="url(#clip)">
    <!-- Right dark -->
    <rect x="0" y="0" width="900" height="260" fill="url(#darkGrad)"/>

    <!-- Left light with sharper diagonal -->
    <polygon points="0,0 420,0 360,260 0,260"
             fill="url(#lightGrad)"/>
  </g>

  <!-- AIR -->
  <text x="55" y="195"
        font-family="Montserrat, Poppins, Arial Black, sans-serif"
        font-size="180"
        font-weight="900"
        letter-spacing="-2"
        fill="#1f8ec9">
    AIR
  </text>

  <!-- COOL -->
  <text x="395" y="195"
        font-family="Montserrat, Poppins, Arial Black, sans-serif"
        font-size="180"
        font-weight="900"
        letter-spacing="-2"
        fill="url(#coolText)">
    COOL
  </text>

</svg>
