name: Deploy new_website to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'new_website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload new_website as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./new_website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
